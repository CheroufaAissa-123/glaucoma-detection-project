<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlaucomaAI - Détection du Glaucome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }
        .main-card {
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
        }
    </style>
</head>
<body class="min-h-screen py-12">
    <div class="max-w-6xl mx-auto px-6">
        <!-- Header -->
        <div class="text-center mb-12">
            <div class="flex items-center justify-center gap-3 mb-3">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-eye text-white text-3xl"></i>
                </div>
                <h1 class="text-4xl font-bold text-blue-700">GlaucomaAI</h1>
            </div>
            <p class="text-xl text-gray-600">Détection Intelligente du Glaucome</p>
            <p class="text-sm text-gray-500">Modèle ConvNeXt • Démo Locale</p>
        </div>

        <div class="flex flex-col lg:flex-row gap-10 justify-center">
            <!-- Upload Card -->
            <div class="bg-white rounded-3xl main-card w-full lg:w-[420px] p-8">
                <div id="dropZone"
                     class="border-2 border-dashed border-blue-300 hover:border-blue-500 rounded-2xl h-[420px] flex flex-col items-center justify-center cursor-pointer transition-all bg-gray-50">

                    <i class="fa-solid fa-eye text-7xl text-blue-400 mb-6"></i>

                    <p class="text-2xl font-semibold text-gray-800 text-center mb-2">Déposez votre image<br>du fond d'œil</p>
                    <p class="text-gray-500 text-center mb-8">Formats supportés :<br>JPG, PNG, JPEG, BMP, TIFF</p>

                    <input type="file" id="fileInput" accept="image/*" class="hidden">

                    <button onclick="triggerFileSelect(event)"
                            class="px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-2xl flex items-center gap-3 transition-all">
                        <i class="fa-solid fa-folder-open"></i>
                        <span>Sélectionner une image</span>
                    </button>
                </div>

                <!-- Preview -->
                <div id="preview" class="mt-8 hidden">
                    <img id="previewImage" class="mx-auto rounded-2xl shadow-md max-h-80" alt="Aperçu">
                </div>
            </div>

            <!-- Result Card -->
            <div id="resultContainer" class="hidden bg-white rounded-3xl main-card w-full lg:w-[380px] p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold text-gray-800">Résultat de l'analyse</h2>
                    <button onclick="resetAnalysis()"
                            class="text-blue-600 hover:text-blue-700 text-sm flex items-center gap-1">
                        <i class="fa-solid fa-rotate"></i>
                        Nouvelle analyse
                    </button>
                </div>

                <div id="result" class="text-center"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-16 text-gray-500 text-sm">
            API Locale en cours d'exécution sur http://127.0.0.1:5000
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const previewImage = document.getElementById('previewImage');
        const resultContainer = document.getElementById('resultContainer');
        const resultDiv = document.getElementById('result');

        function triggerFileSelect(e) {
            e.stopImmediatePropagation();
            fileInput.click();
        }

        fileInput.addEventListener('change', e => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        dropZone.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') fileInput.click();
        });

        // Drag & Drop
        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('border-red-400', 'bg-red-50');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-red-400', 'bg-red-50');
        });

        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('border-red-400', 'bg-red-50');
            if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert("Veuillez sélectionner une image valide.");
                return;
            }

            // Afficher preview
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImage.src = e.target.result;
                preview.classList.remove('hidden');
            };
            reader.readAsDataURL(file);

            // Afficher le résultat avec loader
            resultContainer.classList.remove('hidden');
            resultDiv.innerHTML = `
                <div class="flex flex-col items-center py-16">
                    <div class="animate-spin rounded-full h-16 w-16 border-4 border-blue-600 border-t-transparent mb-6"></div>
                    <p class="text-lg text-gray-600">Analyse en cours...</p>
                </div>
            `;

            const formData = new FormData();
            formData.append('file', file);

            fetch('http://127.0.0.1:5000/predict', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    resultDiv.innerHTML = `<p class="text-red-600 text-xl">❌ ${data.error}</p>`;
                    return;
                }

                const prob = (data.probability_glaucoma * 100).toFixed(1);
                const isGlaucoma = data.prediction === "Glaucome";
                const confidence = data.confidence || prob;

                const icon = isGlaucoma ? "fa-triangle-exclamation text-red-500" : "fa-circle-check text-emerald-500";
                const bgColor = isGlaucoma ? "bg-red-50 border-red-200" : "bg-emerald-50 border-emerald-200";
                const textColor = isGlaucoma ? "text-red-700" : "text-emerald-700";

                const recommendation = isGlaucoma
                    ? "Consultation ophtalmologique recommandée dans les plus brefs délais."
                    : "Aucun signe de glaucome détecté. Poursuivez vos examens réguliers.";

                resultDiv.innerHTML = `
                    <div class="${bgColor} border-2 rounded-2xl p-8">
                        <div class="flex justify-center text-6xl mb-6">
                            <i class="fa-solid ${icon}"></i>
                        </div>
                        <h3 class="text-3xl font-bold ${textColor} text-center mb-6">
                            ${isGlaucoma ? 'GLAUCOME DÉTECTÉ' : 'RÉSULTAT NORMAL'}
                        </h3>

                        <div class="grid grid-cols-2 gap-6 text-center">
                            <div>
                                <p class="text-gray-500 text-sm">Probabilité Glaucome</p>
                                <p class="text-4xl font-bold ${isGlaucoma ? 'text-red-600' : 'text-gray-700'}">${prob}%</p>
                            </div>
                            <div>
                                <p class="text-gray-500 text-sm">Confiance du modèle</p>
                                <p class="text-4xl font-bold text-blue-600">${confidence}%</p>
                            </div>
                        </div>

                        <div class="mt-8 pt-6 border-t text-center text-gray-600">
                            ${recommendation}
                        </div>
                    </div>
                `;
            })
            .catch(() => {
                resultDiv.innerHTML = `<p class="text-red-600">❌ Impossible de contacter le serveur</p>`;
            });
        }

        function resetAnalysis() {
            preview.classList.add('hidden');
            resultContainer.classList.add('hidden');
            resultDiv.innerHTML = '';
            fileInput.value = '';
        }
    </script>
</body>
</html>
